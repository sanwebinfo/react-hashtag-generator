description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@v6.0.9
      with:
        version: 10.34.3
    - uses: actions/setup-node@v4.4.0
      with:
        node-version: '22.22.3'
        cache: pnpm
    - run: pnpm install
      shell: bash
  using: composite